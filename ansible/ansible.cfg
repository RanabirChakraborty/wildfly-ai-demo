# =========================================================================
# Ansible Configuration File
# =========================================================================
# This file controls Ansible's default behavior
# =========================================================================

[defaults]
# Inventory file location
inventory = inventory

# Disable host key checking for easier SSH (not recommended for production)
host_key_checking = False

# Use the YAML callback plugin for better output formatting
stdout_callback = yaml

# Retry files are saved in /tmp instead of the playbook directory
retry_files_enabled = True
retry_files_save_path = /tmp

# Number of parallel processes
forks = 10

# Gathering facts (set to 'smart' to cache facts)
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Roles path (if using custom roles)
roles_path = ./roles:~/.ansible/roles:/usr/share/ansible/roles

# Collections path
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections

# Display skipped tasks
display_skipped_hosts = False

# Ansible verbosity (0-4, higher = more verbose)
# Can be overridden with -v, -vv, -vvv, -vvvv flags
verbosity = 0

[privilege_escalation]
# Become settings
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# SSH connection settings
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

# Connection timeout
timeout = 30

[colors]
# Colorize output
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
